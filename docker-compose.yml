services:

  # ── 数据库 ──────────────────────────────────────────
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: bjtu-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: bjtu2024
      MYSQL_DATABASE: bjtu_canteen
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pbjtu2024"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── 后端 Spring Boot ────────────────────────────────
  backend:
    build: ./backend
    container_name: bjtu-backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/bjtu_canteen?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: bjtu2024
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  # ── Nginx（前端 + 反向代理）──────────────────────────
  nginx:
    image: docker.m.daocloud.io/library/nginx:alpine
    container_name: bjtu-nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
