<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北交大食堂仿真系统</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:    #3b82f6;
  --blue-dk: #1d4ed8;
  --blue-lt: #60a5fa;
  --blue-bg: #eff6ff;
  --blue-b:  #dbeafe;
  --text:    #0f172a;
  --text2:   #475569;
  --text3:   #94a3b8;
  --bg:      #ffffff;
  --bg2:     #f8fafc;
  --border:  #e2e8f0;
  --shadow:  0 4px 24px rgba(59,130,246,0.10);
  --shadow2: 0 2px 8px rgba(0,0,0,0.05);
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── 导航 ── */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 6%;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px;
}
.nav-brand {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; color: var(--text);
  font-weight: 700; font-size: 15px;
}
.nav-logo {
  width: 34px; height: 34px; border-radius: 9px;
  background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dk) 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.nav-links { display: flex; gap: 28px; }
.nav-links a {
  color: var(--text2); text-decoration: none;
  font-size: 14px; font-weight: 500; transition: color .15s;
}
.nav-links a:hover { color: var(--blue); }

/* ── Hero ── */
.hero {
  padding: 100px 6% 72px;
  text-align: center;
  background:
    radial-gradient(ellipse 700px 500px at 50% -60px, rgba(59,130,246,0.10) 0%, transparent 65%),
    linear-gradient(180deg, #f0f7ff 0%, #ffffff 55%);
  position: relative; overflow: hidden;
}
.hero-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--blue-bg); border: 1px solid var(--blue-b);
  color: var(--blue-dk); border-radius: 20px;
  padding: 5px 16px; font-size: 13px; font-weight: 600;
  margin-bottom: 28px; letter-spacing: .2px;
}
.hero h1 {
  font-size: clamp(32px, 5.5vw, 58px);
  font-weight: 800; letter-spacing: -1.5px;
  line-height: 1.15; margin-bottom: 22px;
}
.hero h1 em {
  font-style: normal;
  background: linear-gradient(135deg, var(--blue) 0%, #818cf8 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero-desc {
  font-size: clamp(15px, 2vw, 18px);
  color: var(--text2); max-width: 540px;
  margin: 0 auto 40px; line-height: 1.75;
}
.hero-btns {
  display: flex; gap: 12px;
  justify-content: center; flex-wrap: wrap;
}
.btn-primary {
  display: inline-flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dk) 100%);
  color: #fff; text-decoration: none;
  padding: 15px 36px; border-radius: 12px;
  font-size: 16px; font-weight: 700;
  box-shadow: 0 4px 20px rgba(59,130,246,0.35);
  transition: transform .15s, box-shadow .15s;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(59,130,246,0.45);
}
.btn-primary small {
  display: block; font-size: 11px;
  font-weight: 400; opacity: .85; margin-top: 1px;
}
.btn-ghost {
  display: inline-flex; align-items: center; gap: 8px;
  background: #fff; border: 1.5px solid var(--border);
  color: var(--text); text-decoration: none;
  padding: 15px 28px; border-radius: 12px;
  font-size: 15px; font-weight: 600;
  transition: border-color .15s, box-shadow .15s;
}
.btn-ghost:hover { border-color: var(--blue-lt); box-shadow: 0 0 0 3px var(--blue-bg); }
.hero-meta {
  margin-top: 22px;
  display: flex; justify-content: center; gap: 22px; flex-wrap: wrap;
  font-size: 13px; color: var(--text3);
}
.hero-meta span { display: flex; align-items: center; gap: 5px; }
.hero-meta .dot { color: #22c55e; font-size: 9px; }

/* ── 统计栏 ── */
.stats-bar { padding: 0 6%; }
.stats-inner {
  max-width: 780px; margin: 0 auto;
  background: #fff; border: 1px solid var(--border);
  border-radius: 16px; box-shadow: var(--shadow);
  display: grid; grid-template-columns: repeat(4, 1fr);
  overflow: hidden;
}
.stat-item {
  padding: 28px 20px; text-align: center;
  border-right: 1px solid var(--border);
}
.stat-item:last-child { border-right: none; }
.stat-num {
  font-size: 30px; font-weight: 800; line-height: 1;
  margin-bottom: 6px;
  background: linear-gradient(135deg, var(--blue) 0%, #818cf8 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.stat-lbl { font-size: 13px; color: var(--text2); }

/* ── 功能 ── */
.features-section { padding: 96px 6%; background: var(--bg2); }
.section-head { text-align: center; margin-bottom: 52px; }
.section-head h2 {
  font-size: clamp(24px, 3.5vw, 36px);
  font-weight: 800; letter-spacing: -.5px; margin-bottom: 10px;
}
.section-head p { font-size: 16px; color: var(--text2); }
.features-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 18px; max-width: 980px; margin: 0 auto;
}
.feat-card {
  background: #fff; border-radius: 16px;
  padding: 28px; border: 1px solid var(--border);
  box-shadow: var(--shadow2);
  transition: transform .2s, box-shadow .2s, border-color .2s;
}
.feat-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
  border-color: var(--blue-b);
}
.feat-icon {
  width: 46px; height: 46px; border-radius: 12px;
  background: var(--blue-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; margin-bottom: 14px;
}
.feat-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
.feat-card p { font-size: 14px; color: var(--text2); line-height: 1.65; }

/* ── 步骤 ── */
.steps-section { padding: 96px 6%; }
.steps-row {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 0; max-width: 880px; margin: 0 auto;
  position: relative;
}
.steps-row::before {
  content: '';
  position: absolute; top: 35px; left: calc(12.5% + 10px); right: calc(12.5% + 10px);
  height: 2px;
  background: linear-gradient(90deg, var(--blue-b) 0%, var(--blue) 50%, var(--blue-b) 100%);
}
.step-item { text-align: center; padding: 0 16px; position: relative; }
.step-circle {
  width: 70px; height: 70px; border-radius: 50%;
  background: #fff; border: 2px solid var(--blue-b);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; margin: 0 auto 18px;
  box-shadow: 0 0 0 6px #fff, 0 2px 12px rgba(59,130,246,0.15);
  position: relative; z-index: 1;
  transition: border-color .2s, box-shadow .2s;
}
.step-item:hover .step-circle {
  border-color: var(--blue);
  box-shadow: 0 0 0 6px #fff, 0 4px 20px rgba(59,130,246,0.25);
}
.step-num {
  position: absolute; top: -5px; right: -5px;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--blue); color: #fff;
  font-size: 11px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
}
.step-item h3 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.step-item p { font-size: 13px; color: var(--text2); line-height: 1.5; }

/* ── 系统要求 ── */
.req-section { padding: 80px 6%; background: var(--bg2); }
.req-card {
  max-width: 740px; margin: 0 auto;
  background: #fff; border-radius: 20px;
  border: 1px solid var(--border); overflow: hidden;
  box-shadow: var(--shadow);
}
.req-top {
  padding: 22px 32px;
  background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dk) 100%);
  color: #fff;
}
.req-top h3 { font-size: 16px; font-weight: 700; }
.req-top p { font-size: 13px; opacity: .85; margin-top: 3px; }
.req-grid { padding: 28px 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.req-row { display: flex; gap: 14px; align-items: flex-start; }
.req-ico {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--blue-bg); display: flex;
  align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.req-row h4 { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
.req-row p { font-size: 13px; color: var(--text2); }
.req-tip {
  margin: 0 32px 28px;
  background: #f0fdf4; border: 1px solid #bbf7d0;
  border-radius: 10px; padding: 12px 16px;
  font-size: 13px; color: #15803d;
  display: flex; align-items: center; gap: 8px;
}

/* ── CTA ── */
.cta-section {
  padding: 96px 6%; text-align: center;
  background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #818cf8 100%);
  color: #fff; position: relative; overflow: hidden;
}
.cta-section::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.cta-inner { position: relative; z-index: 1; }
.cta-section h2 {
  font-size: clamp(24px, 4vw, 40px);
  font-weight: 800; letter-spacing: -.5px; margin-bottom: 10px;
}
.cta-section p { font-size: 15px; opacity: .80; margin-bottom: 36px; }
.btn-white {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.95); color: var(--blue-dk);
  text-decoration: none; padding: 15px 36px;
  border-radius: 12px; font-size: 16px; font-weight: 700;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  transition: transform .15s, box-shadow .15s;
}
.btn-white:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(0,0,0,0.22);
}

/* ── Footer ── */
footer {
  padding: 26px 6%;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px;
  font-size: 13px; color: var(--text3);
}
footer a { color: var(--text3); text-decoration: none; }
footer a:hover { color: var(--blue); }

@media (max-width: 700px) {
  .stats-inner { grid-template-columns: repeat(2, 1fr); }
  .stat-item:nth-child(2) { border-right: none; }
  .steps-row { grid-template-columns: repeat(2, 1fr); gap: 24px; }
  .steps-row::before { display: none; }
  .req-grid { grid-template-columns: 1fr; }
  .nav-links { display: none; }
}
</style>
</head>
<body>

<footer>

</body>
